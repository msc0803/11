name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt6 pandas openpyxl requests websockets pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --name "视频查询工具" --add-data "api_core.py;." gui_app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 视频查询工具-Windows
          path: dist/视频查询工具.exe
