name: Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt6 pandas openpyxl xlrd requests websockets pyinstaller numbers-parser

      - name: Build EXE
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --name "视频素材批量查询工具" --add-data "api_core.py;." gui_app.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 视频素材批量查询工具-Windows
          path: dist/视频素材批量查询工具.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt6 pandas openpyxl xlrd requests websockets pyinstaller numbers-parser

      - name: Build Mac App
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --name "视频素材批量查询工具" --add-data "api_core.py:." gui_app.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 视频素材批量查询工具-Mac
          path: dist/视频素材批量查询工具
